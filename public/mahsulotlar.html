<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MebelCRM — Mahsulotlar</title>
<style>
  :root{
    --navy:#0e1730; --panel:#111d3a; --panel2:#0c1631;
    --line:#243150; --line2:#2f3f63;
    --ink:#e5ebf7; --muted:#93a4c6; --muted2:#6f7fa3;
    --accent:#f4a93c; --green:#3fae74; --blue:#5b8def; --cyan:#39e0c7; --red:#ff6b6b;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 700px at 70% -10%, #16223f 0%, transparent 60%), linear-gradient(180deg,#0c1429,#0a1020);
    background-color:#0a1020; color:var(--ink); min-height:100vh; padding:22px 16px 48px; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto}
  .appbar{display:flex;align-items:center;gap:11px;margin-bottom:16px;flex-wrap:wrap}
  .lg{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#e07b00);display:flex;align-items:center;justify-content:center;font-size:20px}
  .brand{font-size:17px;font-weight:800}
  .brand small{display:block;font-size:11.5px;color:var(--muted);font-weight:600}
  .demo-pill{margin-left:auto;font-size:11px;font-weight:700;color:var(--accent);background:rgba(244,169,60,.12);border:1px solid rgba(244,169,60,.3);padding:5px 11px;border-radius:14px}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--navy);border:1px solid var(--line);border-radius:13px;padding:13px 14px}
  .stat .lbl{font-size:10.5px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
  .stat .val{font-size:19px;font-weight:800;font-family:ui-monospace,monospace;line-height:1.1}
  .stat.a .val{color:var(--ink)} .stat.b .val{color:var(--accent)} .stat.c .val{color:var(--red)} .stat.d .val{color:var(--cyan)}
  .stat .cur{font-size:10px;color:var(--muted2);font-weight:600}

  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  .toolbar input,.toolbar select{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--ink);font-size:14px;padding:11px 13px;outline:none}
  .toolbar input{flex:1;min-width:150px}
  .toolbar input:focus,.toolbar select:focus{border-color:var(--accent)}
  .addbtn{background:var(--accent);border:none;color:#241600;font-size:14px;font-weight:800;padding:11px 16px;border-radius:10px;cursor:pointer;flex-shrink:0}

  .filt{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
  .filt button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:16px;cursor:pointer}
  .filt button.active{border-color:var(--accent);color:var(--ink);background:rgba(244,169,60,.1)}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  .pcard{background:var(--navy);border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.25);display:flex;flex-direction:column;transition:transform .15s,border-color .15s}
  .pcard:hover{transform:translateY(-3px);border-color:var(--line2)}
  .thumb{height:104px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative}
  .cat-tag{position:absolute;top:9px;left:9px;font-size:10px;font-weight:700;background:rgba(10,16,32,.55);color:#fff;padding:3px 9px;border-radius:11px;backdrop-filter:blur(3px)}
  .stock-tag{position:absolute;top:9px;right:9px;font-size:10px;font-weight:800;padding:3px 9px;border-radius:11px}
  .pbody{padding:13px 14px;display:flex;flex-direction:column;flex:1}
  .pname{font-size:14.5px;font-weight:700;line-height:1.25;margin-bottom:4px}
  .pmat{font-size:11.5px;color:var(--muted2);margin-bottom:10px}
  .pfoot{margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
  .price{font-size:17px;font-weight:800;font-family:ui-monospace,monospace;color:var(--accent);line-height:1}
  .price small{display:block;font-size:10px;color:var(--muted2);font-weight:600;margin-top:2px}
  .pacts{display:flex;gap:5px}
  .pacts button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .pacts button:hover{color:var(--ink)} .pacts .d:hover{color:var(--red);border-color:var(--red)}
  .empty{text-align:center;color:var(--muted2);font-size:13.5px;padding:40px 0}

  .ov{position:fixed;inset:0;background:rgba(6,10,20,.7);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}
  .ov.show{display:flex}
  .modal{background:var(--navy);border:1px solid var(--line2);border-radius:18px;max-width:440px;width:100%;padding:22px;box-shadow:0 30px 80px rgba(0,0,0,.6);max-height:92vh;overflow-y:auto}
  .modal h2{font-size:18px;font-weight:800;margin-bottom:14px}
  .fl{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:12px 0 6px}
  .fi{width:100%;background:var(--panel2);border:1px solid var(--line2);border-radius:10px;color:var(--ink);font-size:14px;padding:11px 13px;outline:none}
  .fi:focus{border-color:var(--accent)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .macts{display:flex;gap:10px;margin-top:18px}
  .macts button{flex:1;border:none;border-radius:11px;font-size:14px;font-weight:700;padding:12px;cursor:pointer}
  .b-save{background:var(--accent);color:#241600} .b-x{background:var(--panel2);color:var(--ink);border:1px solid var(--line)!important}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#1a2540;border:1px solid var(--line2);color:var(--ink);font-size:13.5px;font-weight:600;padding:11px 18px;border-radius:24px;opacity:0;transition:all .25s;z-index:60;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:680px){ .stats{grid-template-columns:repeat(2,1fr)} }
  @media(max-width:520px){ body{padding:18px 12px 42px} .grid{grid-template-columns:repeat(2,1fr);gap:10px} .thumb{height:84px;font-size:36px} .price{font-size:15px} }
  @media(max-width:380px){ .grid{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <div class="appbar">
    <span class="lg">🛒</span>
    <div class="brand">MebelCRM — Mahsulotlar<small>Sotuvdagi mebellar, narxlar va ombor</small></div>
    <span class="demo-pill">DEMO</span>
  </div>

  <div class="stats">
    <div class="stat a"><div class="lbl">Mahsulot turlari</div><div class="val" id="s-count">0</div></div>
    <div class="stat b"><div class="lbl">Ombor qiymati</div><div class="val" id="s-value">0</div><div class="cur">so'm</div></div>
    <div class="stat c"><div class="lbl">Kam / tugagan</div><div class="val" id="s-low">0</div></div>
    <div class="stat d"><div class="lbl">Jami dona</div><div class="val" id="s-units">0</div></div>
  </div>

  <div class="toolbar">
    <input id="q" placeholder="Mahsulot qidirish..." oninput="render()">
    <select id="sort" onchange="render()">
      <option value="new">Yangi qo'shilgan</option>
      <option value="price-asc">Narx: arzondan</option>
      <option value="price-desc">Narx: qimmatdan</option>
      <option value="name">Nom bo'yicha</option>
    </select>
    <button class="addbtn" onclick="openAdd()">+ Yangi mahsulot</button>
  </div>

  <div class="filt" id="filt"></div>
  <div class="grid" id="grid"></div>
</div>

<div class="ov" id="ov">
  <div class="modal">
    <h2 id="m-title">Yangi mahsulot</h2>
    <label class="fl">Mahsulot nomi</label>
    <input class="fi" id="f-nm" placeholder="Masalan: Kravat «Komfort» 160×200">
    <div class="row2">
      <div><label class="fl">Kategoriya</label><select class="fi" id="f-cat"></select></div>
      <div><label class="fl">Material</label>
        <select class="fi" id="f-mat"><option>LDSP</option><option>MDF</option><option>Qarag'ay</option><option>Yong'oq</option><option>Aralash</option></select>
      </div>
    </div>
    <div class="row2">
      <div><label class="fl">Narx (so'm)</label><input class="fi" id="f-price" type="number" placeholder="2600000"></div>
      <div><label class="fl">Omborda (dona)</label><input class="fi" id="f-stock" type="number" placeholder="4"></div>
    </div>
    <div class="macts">
      <button class="b-x" onclick="closeAdd()">Bekor</button>
      <button class="b-save" onclick="saveProd()">Saqlash</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var mem={};
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k]||null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }

var CAT={
  yotoq:  {label:"Yotoq xona", ic:"🛏", grad:"linear-gradient(135deg,#1e3a8a,#3b5bdb)"},
  oshxona:{label:"Oshxona",    ic:"🍽", grad:"linear-gradient(135deg,#9a3412,#ea7317)"},
  mehmon: {label:"Mehmonxona", ic:"🛋", grad:"linear-gradient(135deg,#155e63,#22b3a6)"},
  ofis:   {label:"Ofis",       ic:"💼", grad:"linear-gradient(135deg,#334155,#64748b)"},
  bolalar:{label:"Bolalar",    ic:"🧒", grad:"linear-gradient(135deg,#166534,#2fae5a)"}
};
var CATORD=['yotoq','oshxona','mehmon','ofis','bolalar'];

var prods, catFilter='all';
function uid(){ return Date.now()+''+Math.floor(Math.random()*99999); }

function seed(){
  prods=[
    {id:uid(), nm:"Kravat «Komfort» 160×200", cat:"yotoq",   mat:"LDSP",     price:2600000, stock:4},
    {id:uid(), nm:"Oshxona garnituri «Modern»", cat:"oshxona", mat:"MDF",     price:5800000, stock:2},
    {id:uid(), nm:"Shkaf-kupe 3 eshik", cat:"yotoq",   mat:"LDSP",     price:4200000, stock:3},
    {id:uid(), nm:"Ofis stuli «Comfy»", cat:"ofis",    mat:"Aralash",  price:850000,  stock:12},
    {id:uid(), nm:"Mehmonxona divani «Royal»", cat:"mehmon", mat:"Yong'oq", price:6500000, stock:1},
    {id:uid(), nm:"Bolalar karavoti (2 qavatli)", cat:"bolalar", mat:"Qarag'ay", price:3100000, stock:5},
    {id:uid(), nm:"Ofis stoli «Direktor»", cat:"ofis", mat:"MDF",      price:3400000, stock:2},
    {id:uid(), nm:"Oshxona stol + 4 stul", cat:"oshxona", mat:"LDSP",  price:2900000, stock:0},
    {id:uid(), nm:"TV tumba «Linea»", cat:"mehmon", mat:"LDSP",        price:1450000, stock:6},
    {id:uid(), nm:"Kiyim shkafi 2 eshik", cat:"yotoq", mat:"MDF",      price:1950000, stock:3}
  ];
  save();
}
function load(){
  var raw=lsGet('mcrm_prods1');
  if(raw===null){ seed(); return; }
  try{ prods=JSON.parse(raw); }catch(e){ prods=null; }
  if(!Array.isArray(prods)) prods=[];
}
function save(){ lsSet('mcrm_prods1', JSON.stringify(prods)); }

function som(n){ return Math.round(n).toLocaleString('ru-RU').replace(/,/g,' '); }
function shortNum(n){ if(n>=1e6) return (n/1e6).toFixed(n%1e6?1:0)+' mln'; if(n>=1e3) return Math.round(n/1e3)+' ming'; return ''+n; }
function stockMeta(s){
  if(s<=0) return {txt:"Tugagan", col:"#fff", bg:"rgba(255,107,107,.85)"};
  if(s<=2) return {txt:s+" dona", col:"#241600", bg:"rgba(244,169,60,.9)"};
  return {txt:s+" dona", col:"#06210f", bg:"rgba(63,174,116,.9)"};
}

function renderStats(){
  var value=0, units=0, low=0;
  prods.forEach(function(p){ value+=p.price*p.stock; units+=p.stock; if(p.stock<=2) low++; });
  document.getElementById('s-count').textContent=prods.length;
  document.getElementById('s-value').textContent=shortNum(value);
  document.getElementById('s-low').textContent=low;
  document.getElementById('s-units').textContent=units;
}
function renderFilt(){
  var cnt={}; prods.forEach(function(p){ cnt[p.cat]=(cnt[p.cat]||0)+1; });
  var b='<button class="'+(catFilter==='all'?'active':'')+'" onclick="setCat(\'all\')">Hammasi '+prods.length+'</button>';
  b+=CATORD.map(function(k){ return '<button class="'+(catFilter===k?'active':'')+'" onclick="setCat(\''+k+'\')">'+CAT[k].ic+' '+CAT[k].label+' '+(cnt[k]||0)+'</button>'; }).join('');
  document.getElementById('filt').innerHTML=b;
}
function setCat(k){ catFilter=k; render(); }

function render(){
  renderStats(); renderFilt();
  var q=(document.getElementById('q').value||'').toLowerCase();
  var sort=document.getElementById('sort').value;
  var list=prods.filter(function(p){
    if(catFilter!=='all' && p.cat!==catFilter) return false;
    if(q && (p.nm+' '+p.mat).toLowerCase().indexOf(q)<0) return false;
    return true;
  });
  if(sort==='price-asc') list.sort(function(a,b){return a.price-b.price;});
  else if(sort==='price-desc') list.sort(function(a,b){return b.price-a.price;});
  else if(sort==='name') list.sort(function(a,b){return a.nm.localeCompare(b.nm);});
  var box=document.getElementById('grid');
  if(!list.length){ box.innerHTML='<div class="empty">Mahsulot topilmadi.</div>'; return; }
  box.innerHTML=list.map(function(p){
    var c=CAT[p.cat]||CAT.yotoq, sm=stockMeta(p.stock);
    return '<div class="pcard"><div class="thumb" style="background:'+c.grad+'">'+c.ic
      +'<span class="cat-tag">'+c.label+'</span><span class="stock-tag" style="background:'+sm.bg+';color:'+sm.col+'">'+sm.txt+'</span></div>'
      +'<div class="pbody"><div class="pname">'+p.nm+'</div><div class="pmat">Material: '+p.mat+'</div>'
      +'<div class="pfoot"><div class="price">'+som(p.price)+'<small>so\'m</small></div>'
      +'<div class="pacts"><button onclick="openEdit(\''+p.id+'\')" title="Tahrirlash">✏️</button>'
      +'<button class="d" onclick="delProd(\''+p.id+'\')" title="O\'chirish">🗑</button></div></div></div></div>';
  }).join('');
}
function delProd(id){ if(!confirm("Mahsulot o'chirilsinmi?")) return; prods=prods.filter(function(x){return x.id!==id;}); save(); render(); }

var editId=null;
function fillCat(){ document.getElementById('f-cat').innerHTML=CATORD.map(function(k){return '<option value="'+k+'">'+CAT[k].ic+' '+CAT[k].label+'</option>';}).join(''); }
function openAdd(){
  editId=null; document.getElementById('m-title').textContent='Yangi mahsulot';
  document.getElementById('f-nm').value=''; document.getElementById('f-cat').value='yotoq';
  document.getElementById('f-mat').value='LDSP'; document.getElementById('f-price').value=''; document.getElementById('f-stock').value='';
  document.getElementById('ov').classList.add('show'); document.getElementById('f-nm').focus();
}
function openEdit(id){
  var p=prods.filter(function(x){return x.id===id;})[0]; if(!p) return;
  editId=id; document.getElementById('m-title').textContent='Mahsulotni tahrirlash';
  document.getElementById('f-nm').value=p.nm; document.getElementById('f-cat').value=p.cat;
  document.getElementById('f-mat').value=p.mat; document.getElementById('f-price').value=p.price; document.getElementById('f-stock').value=p.stock;
  document.getElementById('ov').classList.add('show');
}
function closeAdd(){ document.getElementById('ov').classList.remove('show'); }
function saveProd(){
  var nm=document.getElementById('f-nm').value.trim();
  var price=parseInt(document.getElementById('f-price').value,10);
  var stock=parseInt(document.getElementById('f-stock').value,10);
  if(!nm){ toast("Nom kiriting"); return; }
  if(isNaN(price)||price<0){ toast("Narxni to'g'ri kiriting"); return; }
  if(isNaN(stock)||stock<0) stock=0;
  var obj={ cat:document.getElementById('f-cat').value, mat:document.getElementById('f-mat').value, nm:nm, price:price, stock:stock };
  if(editId){ var p=prods.filter(function(x){return x.id===editId;})[0]; if(p){ p.nm=obj.nm;p.cat=obj.cat;p.mat=obj.mat;p.price=obj.price;p.stock=obj.stock; } toast("Saqlandi"); }
  else { obj.id=uid(); prods.unshift(obj); toast("Mahsulot qo'shildi: "+nm); }
  save(); render(); closeAdd();
}

var toastT;
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove('show'); },2200); }

fillCat(); load(); render();
</script>
</body>
</html>
